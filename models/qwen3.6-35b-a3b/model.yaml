name: qwen3.6-35b-a3b

description: |
 Qwen3.6 35B A3B is a multimodal (text + vision) Mixture-of-Experts
 instruction-tuned model with 3B active nodes, enabling efficient
 inference while maintaining high-quality reasoning and vision capabilities.
model-card-url: https://huggingface.co/mrmara/Qwen3.6-35B-A3B-UD-Q4_K_M-5GB
quantization: ud-q4-k-m

disk-size: 21967M

capabilities:
  - text
  - vision
  - thinking
  - tools

components:
  - model-35b-a3b-ud-q4-k-m-1-of-6
  - model-35b-a3b-ud-q4-k-m-2-of-6
  - model-35b-a3b-ud-q4-k-m-3-of-6
  - model-35b-a3b-ud-q4-k-m-4-of-6
  - model-35b-a3b-ud-q4-k-m-5-of-6
  - model-35b-a3b-ud-q4-k-m-6-of-6
  - mmproj-35b-a3b-f16-gguf

environment:
  # The model is split into multiple shards, maintained in individual component directories.
  # However, llama-server expects the shards to be located in the same directory.
  # The layout below flattens them into a single directory via symlinks.
  # The model file path is set to the first shard's symlink:
  - SHARDS_DIR=/tmp/qwen3-6-35b-a3b-ud-q4-k-m-shards
  - MODEL_FILE=$SHARDS_DIR/Qwen3.6-35B-A3B-UD-Q4_K_M-00001-of-00006.gguf
  - MODEL_NAME=qwen3-6-35b-a3b-ud-q4-k-m
  - MMPROJ_FILE=$SNAP_COMPONENTS/mmproj-35b-a3b-f16-gguf/mmproj-F16.gguf

layout:
  $SHARDS_DIR/Qwen3.6-35B-A3B-UD-Q4_K_M-00001-of-00006.gguf:
    symlink: $SNAP_COMPONENTS/model-35b-a3b-ud-q4-k-m-1-of-6/Qwen3.6-35B-A3B-UD-Q4_K_M-00001-of-00006.gguf
  $SHARDS_DIR/Qwen3.6-35B-A3B-UD-Q4_K_M-00002-of-00006.gguf:
    symlink: $SNAP_COMPONENTS/model-35b-a3b-ud-q4-k-m-2-of-6/Qwen3.6-35B-A3B-UD-Q4_K_M-00002-of-00006.gguf
  $SHARDS_DIR/Qwen3.6-35B-A3B-UD-Q4_K_M-00003-of-00006.gguf:
    symlink: $SNAP_COMPONENTS/model-35b-a3b-ud-q4-k-m-3-of-6/Qwen3.6-35B-A3B-UD-Q4_K_M-00003-of-00006.gguf
  $SHARDS_DIR/Qwen3.6-35B-A3B-UD-Q4_K_M-00004-of-00006.gguf:
    symlink: $SNAP_COMPONENTS/model-35b-a3b-ud-q4-k-m-4-of-6/Qwen3.6-35B-A3B-UD-Q4_K_M-00004-of-00006.gguf
  $SHARDS_DIR/Qwen3.6-35B-A3B-UD-Q4_K_M-00005-of-00006.gguf:
    symlink: $SNAP_COMPONENTS/model-35b-a3b-ud-q4-k-m-5-of-6/Qwen3.6-35B-A3B-UD-Q4_K_M-00005-of-00006.gguf
  $SHARDS_DIR/Qwen3.6-35B-A3B-UD-Q4_K_M-00006-of-00006.gguf:
    symlink: $SNAP_COMPONENTS/model-35b-a3b-ud-q4-k-m-6-of-6/Qwen3.6-35B-A3B-UD-Q4_K_M-00006-of-00006.gguf
