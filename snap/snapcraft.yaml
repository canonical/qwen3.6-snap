name: qwen3-6
base: core24
title: Qwen 3.6
summary: Qwen 3.6 inference snap
description: |
  Qwen 3.6 is a multimodal (text + vision) instruction-tuned language model from Alibaba.

  Use this snap to run Qwen 3.6, optimized for your silicon.

  Before you start, ensure the necessary drivers are installed on the host:
  https://documentation.ubuntu.com/inference-snaps/how-to/install-drivers/

  **Install:**

  `sudo snap install qwen3-6`

  **Get help:**

  `qwen3-6 --help`

  **Licensing:**

  The Qwen 3.6 model is provided by Alibaba under the Apache 2.0 license.

  The licenses of all bundled software can be found inside the snap at
  `/snap/qwen3-6/current/usr/share/doc`.

website: https://documentation.ubuntu.com/inference-snaps
source-code: https://github.com/canonical/qwen3.6-snap
issues: https://github.com/canonical/inference-snaps/issues

adopt-info: version

grade: stable
confinement: strict
compression: lzo

assumes:
  - snapd2.68 # for components support

platforms:
  amd64:
  arm64:

slots:
  status:
    interface: content
    source:
      read:
        - &status-share $SNAP_DATA/share/status
  open-webui:
    interface: content
    content: open-webui-config
    source:
      read:
        - &owui-share $SNAP_DATA/share/open-webui

plugs:
  # To allow side-loading models into server (root daemon) from user home directory
  home:
    read: all

environment:
  SNAP_COMPONENTS: /snap/$SNAP_INSTANCE_NAME/components/$SNAP_REVISION
  ARCH_TRIPLET: $CRAFT_ARCH_TRIPLET_BUILD_FOR
  STATUS_SHARE: *status-share # Status directory shared via content interface
  OWUI_SHARE: *owui-share # Open WebUI config directory shared via content interface

layout:
  # Under wsl the libraries are expected in /usr/lib/wsl
  /usr/lib/wsl:
    bind: $SNAP_COMMON/usr/lib/wsl

hooks:
  install:
    plugs: &install-plugs
      # For hardware detection
      - hardware-observe
      - opengl
  post-refresh:
    plugs: *install-plugs

parts:
  version:
    after: [cli]
    plugin: nil
    source: . # To regenerate the git hash on every change
    build-packages:
      - jq
      - git
    override-pull: |
      # Do nothing. This significantly reduces build time when sourcing large files.
    override-build: |
      set -eo pipefail
      cli_version=$($CRAFT_STAGE/bin/modelctl version --format=json | jq .cli --raw-output)
      git_hash=$(git -C "$SNAPCRAFT_PROJECT_DIR" describe --always)
      craftctl set version="${cli_version#v}+${git_hash}"

  cli:
    source:
      - on amd64: https://github.com/canonical/inference-snaps-cli/releases/download/v2.0.0-beta.11/inference-snaps-cli-linux-amd64.tar.xz
      - on arm64: https://github.com/canonical/inference-snaps-cli/releases/download/v2.0.0-beta.11/inference-snaps-cli-linux-arm64.tar.xz
    plugin: dump
    override-build: |
      # For tab completion
      ln --symbolic ./modelctl bin/qwen3-6

      craftctl default

  cli-lspci:
    plugin: nil
    stage-packages:
      - pciutils # lspci

  # Used for NVIDIA vRAM and CUDA Capability detection.
  # Only the binary is included to avoid staging libraries, which should instead be provided by the host through the opengl interface.
  cli-nvidia-smi:
    plugin: nil
    build-packages:
      - nvidia-utils-580
    override-build: |
      mkdir -p $CRAFT_PART_INSTALL/usr/bin
      cp /usr/bin/nvidia-smi $CRAFT_PART_INSTALL/usr/bin/

      license_dir=$CRAFT_PART_INSTALL/usr/share/doc/nvidia-utils-580/
      mkdir -p $license_dir
      cp /usr/share/doc/nvidia-utils-580/copyright $license_dir/

  webui:
    plugin: dump
    source: https://github.com/canonical/inference-snaps-webui/releases/download/v1.1.0/inference-snaps-webui.tar.xz
    organize:
      "*": webui/

  engines:
    source: engines
    plugin: dump
    organize:
      "*": engines/

  models:
    source: models
    plugin: dump
    organize:
      "*": models/

  runtimes:
    source: runtimes
    plugin: dump
    organize:
      "*": runtimes/

  scripts:
    source: scripts
    plugin: dump
    stage-packages:
      - jq
    organize:
      "server.sh": bin/
      "server-webui.sh": bin/
      "export-shared-configs.sh": bin/

  local-component-files:
    plugin: cmake # We use an out-of-source plugin like cmake instead of "dump" to prevent unwanted copies, see https://github.com/canonical/craft-parts/issues/1609
    source: components
    override-build:
      cp -rf --archive --link --no-dereference ${CRAFT_PART_SRC}/* ${CRAFT_PART_INSTALL}
    organize:
      "model-35b-a3b-ud-q4-k-m-gguf/Qwen3.6-35B-A3B-UD-Q4_K_M-00001-of-00006.gguf": (component/model-35b-a3b-ud-q4-k-m-1-of-6)
      "model-35b-a3b-ud-q4-k-m-gguf/Qwen3.6-35B-A3B-UD-Q4_K_M-00002-of-00006.gguf": (component/model-35b-a3b-ud-q4-k-m-2-of-6)
      "model-35b-a3b-ud-q4-k-m-gguf/Qwen3.6-35B-A3B-UD-Q4_K_M-00003-of-00006.gguf": (component/model-35b-a3b-ud-q4-k-m-3-of-6)
      "model-35b-a3b-ud-q4-k-m-gguf/Qwen3.6-35B-A3B-UD-Q4_K_M-00004-of-00006.gguf": (component/model-35b-a3b-ud-q4-k-m-4-of-6)
      "model-35b-a3b-ud-q4-k-m-gguf/Qwen3.6-35B-A3B-UD-Q4_K_M-00005-of-00006.gguf": (component/model-35b-a3b-ud-q4-k-m-5-of-6)
      "model-35b-a3b-ud-q4-k-m-gguf/Qwen3.6-35B-A3B-UD-Q4_K_M-00006-of-00006.gguf": (component/model-35b-a3b-ud-q4-k-m-6-of-6)
      "mmproj-35b-a3b-f16-gguf/mmproj-F16.gguf": (component/mmproj-35b-a3b-f16-gguf)
    prime:
      # Exclude everything not explicitly organized
      - -*

  llamacpp:
    plugin: dump
    source:
      - on amd64: https://github.com/canonical/llama.cpp-builds/releases/download/b9482/llamacpp-amd64.tar.gz
      - on arm64: https://github.com/canonical/llama.cpp-builds/releases/download/b9482/llamacpp-arm64.tar.gz
    stage-packages:
      - libgomp1
    organize:
      "licenses": usr/share/doc/llama.cpp # Add licenses to the snap
      "*": (component/llamacpp)

  llamacpp-cuda:
    plugin: dump
    source:
      - on amd64: https://github.com/canonical/llama.cpp-builds/releases/download/b9482/llamacpp-amd64+cuda12.9.tar.gz
      - on arm64: https://github.com/canonical/llama.cpp-builds/releases/download/b9482/llamacpp-arm64+cuda12.9.tar.gz
    stage-packages:
      - libgomp1
    organize:
      "licenses": usr/share/doc/llama.cpp+cuda # Add licenses to the snap
      "*": (component/llamacpp-cuda)

  llamacpp-rocm:
    plugin: dump
    source: https://github.com/canonical/llama.cpp-builds/releases/download/b9482/llamacpp-amd64+rocm.tar.gz
    stage-packages:
      - libgomp1
      - libatomic1
    organize:
      "licenses": usr/share/doc/llama.cpp+rocm # Add licenses to the snap
      "*": (component/llamacpp-rocm)
    # This part is only for amd64
    override-pull: &amd64-only |
      [ "$CRAFT_ARCH_BUILD_FOR" == "amd64" ] && craftctl default || exit 0
    override-build: *amd64-only
    override-stage: *amd64-only
    override-prime: *amd64-only

  notice:
    plugin: nil
    source: NOTICE
    source-type: file
    override-build: |
      license_dir=$CRAFT_PART_INSTALL/usr/share/doc
      mkdir -p $license_dir
      cp NOTICE $license_dir/
      cp $SNAPCRAFT_PROJECT_DIR/LICENSE $license_dir/
      cp $SNAPCRAFT_PROJECT_DIR/LICENSE-qwen3-6 $license_dir/

components:
  model-35b-a3b-ud-q4-k-m-1-of-6: &model-35b-a3b-ud-q4-k-m
    type: standard
    summary: Qwen3.6-35B-A3B UD-Q4_K_M GGUF
    description: Model weights for Qwen3.6-35B-A3B in GGUF format

  model-35b-a3b-ud-q4-k-m-2-of-6:
    <<: *model-35b-a3b-ud-q4-k-m

  model-35b-a3b-ud-q4-k-m-3-of-6:
    <<: *model-35b-a3b-ud-q4-k-m

  model-35b-a3b-ud-q4-k-m-4-of-6:
    <<: *model-35b-a3b-ud-q4-k-m

  model-35b-a3b-ud-q4-k-m-5-of-6:
    <<: *model-35b-a3b-ud-q4-k-m

  model-35b-a3b-ud-q4-k-m-6-of-6:
    <<: *model-35b-a3b-ud-q4-k-m

  mmproj-35b-a3b-f16-gguf:
    type: standard
    summary: Qwen3.6-35B-A3B F16 mmproj GGUF
    description: Multimodal projector weights for Qwen3.6-35B-A3B vision support in GGUF format

  llamacpp:
    type: standard
    summary: llama.cpp using default CPU instruction sets
    description: LLM inference in C/C++

  llamacpp-cuda:
    type: standard
    summary: llama.cpp with CUDA backend
    description: LLM inference in C/C++

  llamacpp-rocm:
    type: standard
    summary: llama.cpp with ROCm backend
    description: LLM inference in C/C++

apps:
  qwen3-6:
    command: bin/modelctl
    completer: bin/snap-completer.bash
    plugs:
      - hardware-observe
      - opengl
      - network
      - desktop # To open the webui in the browser
    environment:
      ADDITIONAL_FEATURES: chat, webui

  server:
    command: bin/server.sh
    daemon: simple
    plugs:
      - network-bind
      - hardware-observe
      - opengl
      - process-control
      - home

  server-webui:
    command: bin/server-webui.sh
    daemon: simple
    plugs:
      - network-bind
